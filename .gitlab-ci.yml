# GitLab CI configuration for building the WiVRn Pico Neo 2 APK.
#
# Uses GitLab shared runners (no custom runner tags required).
# Builds debug APKs that don't require signing.
# The PvrSDK is automatically downloaded from archive.org.
#
# Pipeline variables (optional, set via UI, API, or trigger):
#   PVR_SDK_URL       Override the PvrSDK download URL
#   CREATE_RELEASE    Set to "true" to also create a GitLab Release (default: not set)

stages:
  - build
  - release

variables:
  ANDROID_SDK_ROOT: "${CI_PROJECT_DIR}/.android-sdk"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
  GIT_STRATEGY: "fetch"
  GIT_DEPTH: "20"

.build_template: &build_template
  stage: build
  image: eclipse-temurin:17-jdk-jammy
  tags: []  # empty = use any shared runner
  cache:
    key:
      files:
        - client/pico_native/build.gradle
        - client/pico_native/gradle/wrapper/gradle-wrapper.properties
      prefix: "gradle-${BUILD_STAGE}"
    paths:
      - client/pico_native/.gradle/caches
      - client/pico_native/.gradle/wrapper
      - client/pico_native/build/_deps
      - .android-sdk
      - external/pvrsdk-native
    policy: pull-push
  artifacts:
    name: "wivrn-neo2-${BUILD_STAGE}-${CI_PIPELINE_ID}"
    paths:
      - build-output/*.apk
    expire_in: never
    reports:
      dotenv: build-output/build-info.env
  before_script:
    - apt-get update -qq && apt-get install -y -qq unzip curl p7zip-full
    - |
      if [ ! -d "${ANDROID_SDK_ROOT}/cmdline-tools" ]; then
        mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
        cd "${ANDROID_SDK_ROOT}/cmdline-tools"
        curl -fSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
        unzip -q cmdline-tools.zip
        mv cmdline-tools latest
        rm cmdline-tools.zip
        cd - > /dev/null
      fi
    - export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"
    - yes | sdkmanager --licenses > /dev/null 2>&1 || true
    - sdkmanager "platform-tools" "platforms;android-34" > /dev/null 2>&1 || true
    - chmod +x client/pico_native/gradlew
  script:
    - export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"
    - ./scripts/build-apk.sh --stage "${BUILD_STAGE}"
    - |
      APK_FILE=$(ls build-output/*.apk 2>/dev/null | head -1)
      if [ -n "$APK_FILE" ]; then
        APK_NAME=$(basename "$APK_FILE")
        VERSION_NAME=$(echo "$APK_NAME" | sed -E 's/wivrn-neo2-(.+)-debug\.apk/\1/')
        echo "APK_FILE=${APK_NAME}" > build-output/build-info.env
        echo "BUILD_STAGE=${BUILD_STAGE}" >> build-output/build-info.env
        echo "VERSION_NAME=${VERSION_NAME}" >> build-output/build-info.env
        echo "APK_NAME=${APK_NAME}" >> build-output/build-info.env
      fi

# --- Build jobs ---

build:debug:
  <<: *build_template
  variables:
    BUILD_STAGE: "debug"
  rules:
    - when: manual
      allow_failure: false

# --- Release job ---

create:release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags: []
  needs:
    - job: build:debug
      artifacts: true
  rules:
    - if: $CREATE_RELEASE == "true"
      when: on_success
    - when: manual
      allow_failure: true
  script:
    - echo "Creating release v${VERSION_NAME} from commit ${CI_COMMIT_SHA}"
  release:
    name: "WiVRn Neo2 ${VERSION_NAME}"
    description: "Debug build from commit ${CI_COMMIT_SHA} on branch ${CI_COMMIT_REF_NAME}.\n\nPipeline: ${CI_PIPELINE_URL}"
    tag_name: "v${VERSION_NAME}"
    ref: "${CI_COMMIT_SHA}"
    assets:
      links:
        - name: "${APK_NAME}"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/build-output/${APK_NAME}"
          link_type: package
