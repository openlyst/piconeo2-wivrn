name: Build APK

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.3.11579264 cmake;3.22.1'

      - name: Build debug APK
        working-directory: client/wivrn-pvr
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp client/wivrn-pvr/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/wivrn-pvr-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wivrn-pvr-apk
          path: artifacts/wivrn-pvr-debug.apk
          retention-days: 0

      - name: Get short SHA
        id: sha
        run: echo "sha7=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release on main
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ steps.sha.outputs.sha7 }}
          name: Build ${{ steps.sha.outputs.sha7 }}
          files: artifacts/wivrn-pvr-debug.apk
          prerelease: true
