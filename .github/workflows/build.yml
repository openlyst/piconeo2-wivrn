name: Build APK

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.3.11579264 cmake;3.22.1'

      - name: Install 7z (p7zip)
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Fetch Pico Neo 2 SDK
        run: ./tools/fetch_pico_sdk.sh "${{ secrets.PICO_SDK_DOWNLOAD_URL }}"

      - name: Verify SDK files present
        run: |
          test -f src/app/src/main/jniLibs/armeabi-v7a/libPvr_UnitySDK.so
          test -f src/app/src/main/jniLibs/armeabi-v7a/libnative.so
          test -f src/app/src/main/jniLibs/armeabi-v7a/libtracking_module.so
          test -f src/app/libs/pvr_classes.jar

      - name: Decode signing keystore
        working-directory: src
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > wivrn-release.keystore
          cat > ../keystore.properties <<'PROPS'
          storeFile=wivrn-release.keystore
          PROPS
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> ../keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> ../keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> ../keystore.properties

      - name: Build release APK
        working-directory: src
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp src/app/build/outputs/apk/release/app-release.apk \
             artifacts/wivrn-pvr-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wivrn-pvr-apk
          path: artifacts/wivrn-pvr-release.apk
          retention-days: 0

      - name: Get short SHA
        id: sha
        run: echo "sha7=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release on main
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ steps.sha.outputs.sha7 }}
          name: Build ${{ steps.sha.outputs.sha7 }}
          files: artifacts/wivrn-pvr-release.apk
          prerelease: true

      - name: Clean up signing secrets
        if: always()
        working-directory: src
        run: |
          rm -f wivrn-release.keystore ../keystore.properties
