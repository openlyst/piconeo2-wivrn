name: Release Build

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit SHA or branch (defaults to main)'
        required: false
        default: 'main'
      unstable:
        description: 'Mark as unstable testing build'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit || 'main' }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.3.11579264 cmake;3.22.1'

      - name: Decode signing keystore
        working-directory: client/wivrn-pvr
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > wivrn-release.keystore
          cat > ../keystore.properties <<'PROPS'
          storeFile=wivrn-release.keystore
          PROPS
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> ../keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> ../keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> ../keystore.properties

      - name: Parse version from changelog
        id: version
        run: |
          # Read the first heading in Changelog.md — that's the latest version.
          head_line=$(head -1 Changelog.md)
          # Strip leading "# " and any markdown link syntax.
          raw=$(echo "$head_line" | sed 's/^# *//' | sed 's/\[//g' | sed 's/\].*//')
          echo "raw=$raw" >> "$GITHUB_OUTPUT"
          echo "version=$raw" >> "$GITHUB_OUTPUT"
          
          # Classify: alpha, beta, rc, or stable.
          lower=$(echo "$raw" | tr '[:upper:]' '[:lower:]')
          if echo "$lower" | grep -q "alpha"; then
            echo "channel=alpha" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif echo "$lower" | grep -q "beta"; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif echo "$lower" | grep -qE "rc|release.candidate"; then
            echo "channel=rc" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply unstable override
        id: final
        run: |
          prerelease="${{ steps.version.outputs.prerelease }}"
          tag="${{ steps.version.outputs.version }}"
          if [ "${{ github.event.inputs.unstable }}" = "true" ]; then
            prerelease="true"
            tag="${tag}-unstable"
          fi
          # Sanitize tag for git (no spaces or slashes).
          tag=$(echo "$tag" | tr ' ' '-' | tr '/' '-')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "channel=${{ steps.version.outputs.channel }}" >> "$GITHUB_OUTPUT"
          echo "version=${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: client/wivrn-pvr
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp client/wivrn-pvr/app/build/outputs/apk/release/app-release.apk \
             artifacts/wivrn-pvr-${{ steps.final.outputs.tag }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wivrn-pvr-${{ steps.final.outputs.tag }}
          path: artifacts/wivrn-pvr-${{ steps.final.outputs.tag }}.apk
          retention-days: 30

      - name: Get short SHA
        id: sha
        run: echo "sha7=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        run: |
          # Extract only the changelog section for this version: from the
          # first "# " heading up to (but not including) the next "# " heading.
          awk '/^# /{if(found){exit} found=1; next} found{print}' Changelog.md > release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Commit:** ${{ steps.sha.outputs.sha7 }}" >> release_notes.md
          echo "**Channel:** ${{ steps.final.outputs.channel }}" >> release_notes.md
          if [ "${{ steps.final.outputs.prerelease }}" = "true" ]; then
            echo "**Status:** Pre-release / testing" >> release_notes.md
          else
            echo "**Status:** Stable release" >> release_notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.final.outputs.tag }}
          name: ${{ steps.final.outputs.version }}
          body_path: release_notes.md
          files: artifacts/wivrn-pvr-${{ steps.final.outputs.tag }}.apk
          prerelease: ${{ steps.final.outputs.prerelease }}
          fail_on_unmatched_files: true

      - name: Clean up signing secrets
        if: always()
        working-directory: client/wivrn-pvr
        run: |
          rm -f wivrn-release.keystore ../keystore.properties
